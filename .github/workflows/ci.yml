name: 🚀 Multi-Environment CI/CD

on:
  push:
    branches: [ "master", "develop" ]

jobs:
  # --- 构建阶段 ---
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact_name: ${{ steps.build-jar.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build with Gradle
        id: build-jar
        run: |
          ./gradlew clean build -x test
          # 这里可以根据分支打标签

  # --- 部署到测试环境 ---
  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: test  # 使用名为 test 的环境配置
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Test Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.TEST_SERVER_IP }} # 调用测试环境的 Secret
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/app/test/"
          strip_components: 2

  # --- 部署到生产环境 ---
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/master'
    environment: production # 使用名为 production 的环境配置，此处可设置人工审核
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Prod Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.PROD_SERVER_IP }} # 调用生产环境的 Secret
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/app/prod/"
          strip_components: 2