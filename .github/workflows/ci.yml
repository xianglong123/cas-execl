name: 🚀 SpringBoot CI/CD

# 触发条件：当推送到 main 分支时
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. 设置 Java 8 环境
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # 3. 构建项目 (使用 Gradle Wrapper)
      - name: Build with Gradle
        run: |
          # 赋予执行权限 (防止权限错误)
          chmod +x ./gradlew
          # 清理、构建，跳过测试
          ./gradlew clean build -x test

      # 4. 将构建好的 JAR 包上传到服务器
      - name: 📤 Upload JAR to Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          # 核心路径配置
          source: "build/libs/*.jar"     # 本地 JAR 路径 (Gradle 默认输出在此)
          target: "/home/app/"           # 服务器目标目录
          # 递归创建目录 (如果不存在)
          mkdir: true

      # 5. 登录服务器，重启应用
      - name: 🔁 Restart Application
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            # 进入 jar 所在目录
            cd /home/app
            
            # 1. 停止旧服务 (根据 jar 名称杀进程)
            # 注意：这里假设你的 jar 名字是固定的，或者用通配符
            echo "Stopping old application..."
            # 查找 java 进程并杀掉 (排除 grep 自身)
            ps -ef | grep java | grep -v grep | awk '{print $2}' | xargs kill -9 2>/dev/null || true
            
            # 2. 启动新服务
            # 注意：这里需要你根据实际的 jar 名字修改 *.jar
            echo "Starting new application..."
            # nohup 后台运行，日志输出到 app.log
            nohup java -jar /home/app/*.jar > /home/app/app.log 2>&1 &
            
            # 3. 检查是否启动成功
            sleep 5
            echo "Current running processes:"
            ps -ef | grep java