name: 🚀 SpringBoot CI/CD

on:
  push:
    branches:
      - "master"
      - "develop"

jobs:
  # --- 构建阶段 ---
  build:
    runs-on: ubuntu-latest
    outputs:
      jar_name: ${{ steps.build-jar.outputs.jar_name }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 1.8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Build with Gradle
        id: build-jar
        run: |
          chmod +x ./gradlew
          ./gradlew clean build -x test

  # --- 部署到测试环境 ---
  deploy-test:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: 📤 Upload to Test Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/app/test/"
          strip_components: 2

      - name: 🔁 Restart Test App
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }} # 对应测试IP
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            cd /home/app/test # 进入测试目录
            
            echo "Stopping old test application..."
            # 精准杀掉在 /home/app/test/ 目录下运行的 java 进程
            ps -ef | grep java | grep '/home/app/test' | grep -v grep | awk '{print $2}' | xargs kill -9 2>/dev/null || true
            
            echo "Starting new test application..."
            nohup java -jar *.jar > ../test.log 2>&1 & # 日志输出到上级目录
            
            sleep 5
            ps -ef | grep java

  # --- 部署到生产环境 ---
  deploy-prod:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: prd
    steps:
      - name: 📤 Upload to Prod Server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          source: "build/libs/*.jar"
          target: "/home/app/prod/"
          strip_components: 2

      - name: 🔁 Restart Prod App
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }} # 修正：使用生产IP
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            cd /home/app/prod # 修正：进入生产目录
            
            echo "Stopping old production application..."
            # 修正：精准杀掉生产目录下的进程
            ps -ef | grep java | grep '/home/app/prod' | grep -v grep | awk '{print $2}' | xargs kill -9 2>/dev/null || true
            
            echo "Starting new production application..."
            # 修正：使用绝对路径启动
            nohup java -jar /home/app/prod/*.jar > /home/app/prod/app.log 2>&1 &
            
            sleep 5
            echo "Current production processes:"
            ps -ef | grep java