name: Java CI with Gradle

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - uses: actions/checkout@v4

      # 2. 设置 Java 环境 (建议与你 build.gradle 里的 targetCompatibility 一致)
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          # 自动缓存 Gradle 的依赖包和缓存文件，能大幅缩短构建时间
          cache: gradle

      # 3. 给 gradlew 赋予可执行权限 (防止权限不足报错)
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. 执行编译和测试
      # --no-daemon 选项在 CI 环境中非常重要，避免后台进程残留
      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      # 6. 显示生成的 JAR 文件信息
      - name: Show JAR info
        run: |          echo "=== Generated JAR files ==="
          ls -lh build/libs/
          echo "=== JAR file size ==="
          du -sh build/libs/*.jar

      # 5. 上传构建好的 Jar 包 (产物一般在 build/libs 目录下)
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cas-excel-jar
          path: build/libs/cas-excel-boot-*.jar